services:
    # Web Application
    web:
        image: ghcr.io/matthewdtowles/i-want-my-mtg/web:latest
        ports:
            - '80:3000'
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - NODE_ENV=${NODE_ENV}
            - JWT_SECRET=${JWT_SECRET}
            - SMTP_HOST=${SMTP_HOST}
            - SMTP_PORT=${SMTP_PORT}
            - SMTP_SECURE=${SMTP_SECURE:-false}
            - SMTP_USER=${SMTP_USER:-}
            - SMTP_PASS=${SMTP_PASS:-}
            - SMTP_FROM=${SMTP_FROM}
            - APP_URL=${APP_URL}
        env_file:
            - .env
        restart: unless-stopped
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    # Scry - ETL Application
    etl:
        image: ghcr.io/matthewdtowles/scry:latest
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - SCRY_LOG=${SCRY_LOG}
        env_file:
            - .env
        profiles: ['etl']
        restart: 'no'
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
