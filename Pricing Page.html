<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pricing — I Want My MTG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --midnight-950: #0d0b1a;
    --midnight-900: #131025;
    --midnight-800: #1a1533;
    --midnight-700: #241e45;
    --midnight-600: #2e2758;
    --teal-500: #2cc8ca;
    --teal-400: #45ddd6;
    --teal-300: #72ece5;
    --teal-200: #a8f4ef;
    --purple-800: #5c2883;
    --purple-700: #7233a4;
    --purple-600: #8b42c6;
    --purple-500: #a95de0;
    --purple-400: #c48aed;
    --purple-300: #dbb5f5;
    --hotpink-500: #f43f82;
    --amber-500: #f59e0b;
  }

  *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
    background: var(--midnight-950);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAVBAR ── */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(to right, #3b1a6b, var(--purple-700), #3b1a6b);
    border-bottom: 2px solid var(--teal-400);
    box-shadow: 0 0 24px 0 rgba(44,200,202,0.18);
  }
  .navbar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.25rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .navbar-logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    color: #fff;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: -0.01em;
  }
  .logo-gem {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--teal-400), var(--purple-500));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
  }
  .navbar-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .icon-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--teal-300);
    padding: 0.5rem;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
  }
  .icon-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

  /* ── DRAWER MENU ── */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,11,26,0.72);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(2px);
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(320px, 88vw);
    background: var(--midnight-900);
    border-left: 1px solid var(--midnight-700);
    z-index: 210;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--midnight-700);
  }
  .drawer-logo { font-weight: 700; font-size: 0.95rem; color: #fff; }
  .drawer-section {
    padding: 1rem 1.25rem 0.25rem;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal-500);
  }
  .drawer-link {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 1.25rem;
    color: #cbd5e1;
    text-decoration: none;
    font-size: 0.925rem;
    font-weight: 500;
    border-radius: 0;
    transition: background 0.12s, color 0.12s;
  }
  .drawer-link:hover { background: var(--midnight-800); color: #fff; }
  .drawer-link.active { color: var(--teal-400); }
  .drawer-link svg { opacity: 0.55; flex-shrink: 0; }
  .drawer-link:hover svg { opacity: 0.8; }
  .drawer-divider { height: 1px; background: var(--midnight-700); margin: 0.75rem 1.25rem; }
  .drawer-upgrade {
    margin: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.6rem 1rem;
    background: var(--amber-500);
    color: var(--midnight-950);
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.15s;
  }
  .drawer-upgrade:hover { background: #fbbf24; }
  .drawer-search {
    margin: 0 1.25rem 0.25rem;
    padding: 0.55rem 0.9rem;
    background: var(--midnight-800);
    border: 1px solid var(--midnight-600);
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 0.875rem;
    font-family: inherit;
    width: calc(100% - 2.5rem);
    outline: none;
    transition: border-color 0.15s;
  }
  .drawer-search:focus { border-color: var(--teal-400); }
  .drawer-search::placeholder { color: #64748b; }
  .drawer-footer {
    margin-top: auto;
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--midnight-700);
    display: flex;
    gap: 0.75rem;
  }
  .drawer-footer a {
    font-size: 0.8rem;
    color: #64748b;
    text-decoration: none;
    transition: color 0.12s;
  }
  .drawer-footer a:hover { color: var(--teal-400); }

  /* ── PAGE HERO ── */
  .hero {
    padding: 5rem 1.25rem 4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 55% at 50% -10%, rgba(114,51,164,0.28) 0%, transparent 70%),
      radial-gradient(ellipse 40% 35% at 75% 60%, rgba(44,200,202,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0.85rem;
    border: 1px solid rgba(44,200,202,0.3);
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--teal-300);
    background: rgba(44,200,202,0.08);
    margin-bottom: 1.5rem;
    letter-spacing: 0.01em;
  }
  .hero-title {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: #f8fafc;
    margin-bottom: 1rem;
    text-wrap: balance;
  }
  .hero-title span {
    background: linear-gradient(90deg, var(--teal-400), var(--purple-400));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    font-size: 1.05rem;
    color: #94a3b8;
    max-width: 480px;
    margin: 0 auto 2.5rem;
    line-height: 1.6;
  }

  /* ── BILLING TOGGLE ── */
  .billing-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--midnight-800);
    border: 1px solid var(--midnight-600);
    border-radius: 999px;
    padding: 0.35rem;
  }
  .toggle-option {
    padding: 0.4rem 1.1rem;
    border-radius: 999px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #94a3b8;
    font-family: inherit;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }
  .toggle-option.active {
    background: var(--midnight-700);
    color: #f8fafc;
  }
  .toggle-badge {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--teal-500), var(--purple-500));
    color: #fff;
    letter-spacing: 0.01em;
  }

  /* ── PRICING CARDS ── */
  .cards-grid {
    max-width: 880px;
    margin: 4rem auto 0;
    padding: 0 1.25rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    align-items: start;
  }
  @media (max-width: 620px) { .cards-grid { grid-template-columns: 1fr; } }

  .pricing-card {
    border-radius: 16px;
    border: 1px solid var(--midnight-700);
    background: var(--midnight-900);
    padding: 2rem;
    position: relative;
    transition: border-color 0.2s;
  }
  .pricing-card.featured {
    border-color: var(--teal-500);
    background: linear-gradient(160deg, rgba(44,200,202,0.05) 0%, var(--midnight-900) 60%);
    box-shadow: 0 0 40px rgba(44,200,202,0.1), inset 0 1px 0 rgba(44,200,202,0.15);
  }
  .card-badge {
    position: absolute;
    top: -1px;
    right: 1.5rem;
    padding: 0.3rem 0.8rem;
    border-radius: 0 0 8px 8px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .card-badge.teal { background: var(--teal-500); color: var(--midnight-950); }
  .card-badge.amber { background: var(--amber-500); color: var(--midnight-950); }

  .card-tier {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 0.6rem;
  }
  .card-tier.teal { color: var(--teal-400); }

  .card-price {
    display: flex;
    align-items: baseline;
    gap: 0.2rem;
    margin-bottom: 0.3rem;
  }
  .price-amount {
    font-size: 2.75rem;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: #f8fafc;
    line-height: 1;
  }
  .price-currency {
    font-size: 1.25rem;
    font-weight: 600;
    color: #94a3b8;
    align-self: flex-start;
    margin-top: 0.3rem;
  }
  .price-period {
    font-size: 0.875rem;
    color: #64748b;
    font-weight: 500;
  }
  .price-note {
    font-size: 0.8rem;
    color: var(--teal-400);
    font-weight: 500;
    margin-bottom: 0.25rem;
    min-height: 1.2em;
  }
  .card-desc {
    font-size: 0.875rem;
    color: #64748b;
    line-height: 1.5;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--midnight-700);
  }

  .card-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    margin-bottom: 1.75rem;
  }
  .card-feature {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    font-size: 0.875rem;
    color: #cbd5e1;
    line-height: 1.4;
  }
  .feat-icon {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    margin-top: 1px;
  }
  .feat-icon.check { color: var(--teal-400); }
  .feat-icon.x { color: #475569; }

  .btn-primary {
    width: 100%;
    padding: 0.75rem 1.5rem;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.925rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
    letter-spacing: -0.01em;
  }
  .btn-cta {
    background: linear-gradient(90deg, var(--teal-500), #3ab5e0);
    color: var(--midnight-950);
    box-shadow: 0 0 20px rgba(44,200,202,0.25);
  }
  .btn-cta:hover { filter: brightness(1.1); box-shadow: 0 0 28px rgba(44,200,202,0.4); }
  .btn-ghost {
    background: transparent;
    color: #94a3b8;
    border: 1px solid var(--midnight-600);
  }
  .btn-ghost:hover { background: var(--midnight-800); color: #e2e8f0; }
  .btn-amber {
    background: var(--amber-500);
    color: var(--midnight-950);
  }
  .btn-amber:hover { background: #fbbf24; }

  /* ── FEATURE TABLE ── */
  .table-section {
    max-width: 880px;
    margin: 5rem auto 0;
    padding: 0 1.25rem;
  }
  .section-heading {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #f8fafc;
    margin-bottom: 0.5rem;
  }
  .section-sub {
    text-align: center;
    font-size: 0.9rem;
    color: #64748b;
    margin-bottom: 2rem;
  }
  .feat-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border: 1px solid var(--midnight-700);
    border-radius: 14px;
    overflow: hidden;
    background: var(--midnight-900);
  }
  .feat-table thead th {
    padding: 1rem 1.25rem;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #64748b;
    background: var(--midnight-800);
    border-bottom: 1px solid var(--midnight-700);
    text-align: left;
  }
  .feat-table thead th:nth-child(2),
  .feat-table thead th:nth-child(3) {
    text-align: center;
    width: 120px;
  }
  .feat-table thead th:nth-child(3) { color: var(--teal-400); }
  .feat-table tbody tr { border-top: 1px solid var(--midnight-800); }
  .feat-table tbody tr:first-child { border-top: none; }
  .feat-table tbody td {
    padding: 0.85rem 1.25rem;
    font-size: 0.875rem;
    color: #cbd5e1;
  }
  .feat-table tbody td:nth-child(2),
  .feat-table tbody td:nth-child(3) { text-align: center; }
  .feat-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
  .feat-table .category-row td {
    padding: 0.6rem 1.25rem 0.3rem;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--purple-400);
    background: rgba(114,51,164,0.06);
    border-top: 1px solid var(--midnight-700);
  }
  .feat-table .category-row:first-child td { border-top: none; }
  .feat-note {
    font-size: 0.75rem;
    color: #475569;
    display: block;
    margin-top: 0.1rem;
  }
  .check-icon { color: var(--teal-400); }
  .x-icon { color: #334155; }
  .partial { font-size: 0.78rem; color: #94a3b8; font-weight: 500; }

  /* ── FAQ ── */
  .faq-section {
    max-width: 680px;
    margin: 5rem auto 0;
    padding: 0 1.25rem;
  }
  .faq-item {
    border-bottom: 1px solid var(--midnight-700);
  }
  .faq-question {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.1rem 0;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    color: #e2e8f0;
    transition: color 0.15s;
  }
  .faq-question:hover { color: var(--teal-300); }
  .faq-chevron {
    flex-shrink: 0;
    color: #475569;
    transition: transform 0.2s;
  }
  .faq-chevron.open { transform: rotate(180deg); color: var(--teal-400); }
  .faq-answer {
    overflow: hidden;
    transition: max-height 0.28s ease, padding 0.2s;
    max-height: 0;
  }
  .faq-answer.open { max-height: 500px; }
  .faq-answer-inner {
    padding-bottom: 1.1rem;
    font-size: 0.875rem;
    color: #94a3b8;
    line-height: 1.7;
  }
  .faq-answer-inner a { color: var(--teal-400); text-decoration: underline; }

  /* ── BOTTOM CTA ── */
  .bottom-cta {
    max-width: 640px;
    margin: 5rem auto 0;
    padding: 0 1.25rem 6rem;
    text-align: center;
  }
  .bottom-cta h2 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #f8fafc;
    margin-bottom: 0.75rem;
  }
  .bottom-cta p {
    font-size: 0.9rem;
    color: #64748b;
    margin-bottom: 1.75rem;
    line-height: 1.6;
  }
  .bottom-cta-btns {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .bottom-cta-btns .btn-primary { width: auto; padding: 0.7rem 1.75rem; }

  /* ── FOOTER ── */
  .footer {
    margin-top: auto;
    border-top: 1px solid var(--midnight-800);
    background: var(--midnight-950);
  }
  .footer-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--teal-400), var(--purple-500), var(--hotpink-500));
  }
  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    font-size: 0.78rem;
    color: #475569;
  }
  .footer-links { display: flex; gap: 1.25rem; }
  .footer-links a { color: #475569; text-decoration: none; transition: color 0.12s; }
  .footer-links a:hover { color: var(--teal-400); }

  /* ── TWEAKS PANEL ── */
  .tweaks-panel {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 280px;
    background: var(--midnight-900);
    border: 1px solid var(--midnight-600);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    z-index: 300;
    font-size: 0.82rem;
    display: none;
  }
  .tweaks-panel.visible { display: block; }
  .tweaks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--midnight-700);
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--teal-300);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .tweaks-close {
    background: none;
    border: none;
    cursor: pointer;
    color: #475569;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }
  .tweaks-close:hover { color: #e2e8f0; }
  .tweaks-body { padding: 0.85rem 1rem; display: flex; flex-direction: column; gap: 0.85rem; }
  .tweak-row { display: flex; flex-direction: column; gap: 0.35rem; }
  .tweak-label { color: #64748b; font-size: 0.75rem; font-weight: 500; }
  .tweak-options { display: flex; gap: 0.4rem; }
  .tweak-opt {
    flex: 1;
    padding: 0.35rem 0.5rem;
    border-radius: 6px;
    border: 1px solid var(--midnight-600);
    background: var(--midnight-800);
    color: #94a3b8;
    font-size: 0.775rem;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    font-weight: 500;
    transition: all 0.15s;
  }
  .tweak-opt.active {
    background: var(--midnight-700);
    border-color: var(--teal-500);
    color: var(--teal-300);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "cardStyle": "gradient",
  "heroSize": "large"
}/*EDITMODE-END*/;

// ── SVG Icons ──────────────────────────────────────────────
const CheckIcon = ({ cls = "check-icon feat-icon" }) => (
  <svg className={cls} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.2">
    <path strokeLinecap="round" strokeLinejoin="round" d="M3 8l3.5 3.5L13 4.5"/>
  </svg>
);

}
