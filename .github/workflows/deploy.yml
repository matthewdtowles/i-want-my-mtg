name: CI/CD

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Run App Unit Tests
              run: |
                  cp .env.example .env
                  docker compose run --rm web npm test

            - name: Cleanup
              run: docker compose down -v

    integration-test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_DB: iwantmymtg_test
                    POSTGRES_USER: testuser
                    POSTGRES_PASSWORD: testpass
                options: >-
                    --health-cmd "pg_isready -U testuser -d iwantmymtg_test"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10
                    --shm-size 256mb
                ports:
                    - 5433:5432
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Initialize schema and run migrations
              env:
                  PGPASSWORD: testpass
              run: |
                  psql -h 127.0.0.1 -p 5433 -U testuser -d iwantmymtg_test -v ON_ERROR_STOP=1 -f docker/postgres/init/001_complete_schema.sql > /dev/null
                  for f in migrations/*.sql; do
                    psql -h 127.0.0.1 -p 5433 -U testuser -d iwantmymtg_test -v ON_ERROR_STOP=1 -f "$f" > /dev/null
                  done

            - name: Seed test data
              env:
                  PGPASSWORD: testpass
              run: psql -h 127.0.0.1 -p 5433 -U testuser -d iwantmymtg_test -v ON_ERROR_STOP=1 -f test/integration/seed.sql > /dev/null

            - name: Run integration tests
              env:
                  DB_HOST: 127.0.0.1
                  DB_PORT: 5433
                  DB_USERNAME: testuser
                  DB_PASSWORD: testpass
                  DB_NAME: iwantmymtg_test
                  JWT_SECRET: integ-test-secret
                  NODE_ENV: test
              run: npx jest --config test/jest-e2e.json --runInBand

    tag:
        needs: [test, integration-test]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Get version from package.json
              id: version
              run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

            - name: Check if tag exists
              id: check
              run: |
                  if git ls-remote --tags origin "${{ steps.version.outputs.version }}" | grep -q .; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create release
              if: steps.check.outputs.exists == 'false'
              run: gh release create "${{ steps.version.outputs.version }}" --generate-notes --title "${{ steps.version.outputs.version }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        needs: [test, integration-test]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: read
            packages: write
        env:
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.repository }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Login to Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and Push Web App
              uses: docker/build-push-action@v7
              with:
                  context: .
                  target: production
                  push: true
                  provenance: false
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}


    deploy:
        needs: build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        environment: production

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Make deployment script executable
              run: chmod +x .github/scripts/deploy.sh

            - name: Deploy to Production
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PK }}
                  LIGHTSAIL_IP: ${{ secrets.LIGHTSAIL_IP }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
                  LIGHTSAIL_GITHUB_TOKEN: ${{ secrets.LIGHTSAIL_GITHUB_TOKEN }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  NODE_ENV: ${{ secrets.NODE_ENV }}
                  SCRY_LOG: ${{ secrets.SCRY_LOG }}
                  SMTP_HOST: ${{ secrets.SMTP_HOST }}
                  SMTP_PORT: 587
                  SMTP_SECURE: false
                  SMTP_USER: ${{ secrets.SMTP_USER }}
                  SMTP_PASS: ${{ secrets.SMTP_PASS }}
                  SMTP_FROM: noreply@iwantmymtg.net
                  APP_URL: https://iwantmymtg.net
              run: ./.github/scripts/deploy.sh
