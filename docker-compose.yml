services:
    # Web Application
    web:
        build:
            context: .
            target: development
        ports:
            - '3000:3000'
        environment:
            - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            - NODE_ENV=${NODE_ENV}
            - JWT_SECRET=${JWT_SECRET}
            - SMTP_HOST=mailhog
            - SMTP_PORT=1025
            - SMTP_SECURE=false
            - SMTP_FROM=noreply@iwantmymtg.local
            - APP_URL=http://localhost:3000
        volumes:
            - .:/app
            - /app/node_modules
        depends_on:
            postgres:
                condition: service_healthy
            mailhog:
                condition: service_started
        restart: unless-stopped
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    # Scry - ETL Application (image from ghcr.io/matthewdtowles/scry)
    etl:
        image: ghcr.io/matthewdtowles/scry:latest
        environment:
            - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            - SCRY_LOG=${SCRY_LOG}
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
        profiles: ['etl']
        restart: 'no'
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
        working_dir: /app
        command: ['./scry', 'ingest']

    # PostgreSQL Database (shared by web and etl)
    postgres:
        image: postgres:18-alpine
        shm_size: 256mb
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - PGDATA=/var/lib/postgresql/data
        env_file:
            - .env
        ports:
            - '5432:5432'
        volumes:
            - postgres_dev_data:/var/lib/postgresql/data
            - ./docker/postgres/init:/docker-entrypoint-initdb.d/
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 30s

    # Database Admin Interface
    adminer:
        image: adminer:latest
        ports:
            - '8080:8080'
        depends_on:
            - postgres

    migrate:
        image: postgres:18-alpine
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./migrations:/migrations:ro
        entrypoint: ['/migrations/run_migrations.sh']
        profiles: ['migrate']
        restart: 'no'

    mailhog:
        image: mailhog/mailhog:latest
        container_name: mtg-mailhog
        ports:
            - '1025:1025' # SMTP
            - '8025:8025' # Web UI
        restart: unless-stopped

volumes:
    postgres_dev_data:
