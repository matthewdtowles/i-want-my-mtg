name: CI/CD

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run App Unit Tests
              run: |
                  cp .env.example .env
                  docker compose run --rm web npm test

            - name: Cleanup
              run: docker compose down -v

    tag:
        needs: test
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get current version
              id: current
              run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

            - name: Determine bump type from commits
              id: bump
              run: |
                  LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  if [ -z "$LAST_TAG" ]; then
                    RANGE="HEAD"
                  else
                    RANGE="${LAST_TAG}..HEAD"
                  fi
                  COMMITS=$(git log "$RANGE" --pretty=format:"%s%n%b")
                  if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+!:"; then
                    echo "type=major" >> "$GITHUB_OUTPUT"
                  elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
                    echo "type=minor" >> "$GITHUB_OUTPUT"
                  else
                    echo "type=patch" >> "$GITHUB_OUTPUT"
                  fi

            - name: Compute new version
              id: version
              run: |
                  IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
                  case "${{ steps.bump.outputs.type }}" in
                    major) major=$((major + 1)); minor=0; patch=0 ;;
                    minor) minor=$((minor + 1)); patch=0 ;;
                    patch) patch=$((patch + 1)) ;;
                  esac
                  echo "new_version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

            - name: Check if tag exists
              id: check
              run: |
                  if git ls-remote --tags origin "${{ steps.version.outputs.new_version }}" | grep -q .; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Update package.json version
              if: steps.check.outputs.exists == 'false'
              run: |
                  npm version "${{ steps.version.outputs.new_version }}" --no-git-tag-version
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package.json package-lock.json
                  git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
                  git push

            - name: Create release
              if: steps.check.outputs.exists == 'false'
              run: gh release create "${{ steps.version.outputs.new_version }}" --generate-notes --title "${{ steps.version.outputs.new_version }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        needs: [test, tag]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: read
            packages: write
        env:
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.repository }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and Push Web App
              uses: docker/build-push-action@v5
              with:
                  context: .
                  target: production
                  push: true
                  provenance: false
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}

            - name: Build and Push ETL App
              uses: docker/build-push-action@v5
              with:
                  context: ./scry
                  target: production
                  push: true
                  provenance: false
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/etl:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/etl:${{ github.sha }}

    deploy:
        needs: build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        environment: production

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Make deployment script executable
              run: chmod +x .github/scripts/deploy.sh

            - name: Deploy to Production
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PK }}
                  LIGHTSAIL_IP: ${{ secrets.LIGHTSAIL_IP }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
                  LIGHTSAIL_GITHUB_TOKEN: ${{ secrets.LIGHTSAIL_GITHUB_TOKEN }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  NODE_ENV: ${{ secrets.NODE_ENV }}
                  SCRY_LOG: ${{ secrets.SCRY_LOG }}
                  SMTP_HOST: ${{ secrets.SMTP_HOST }}
                  SMTP_PORT: 587
                  SMTP_SECURE: false
                  SMTP_USER: ${{ secrets.SMTP_USER }}
                  SMTP_PASS: ${{ secrets.SMTP_PASS }}
                  SMTP_FROM: noreply@iwantmymtg.net
                  APP_URL: https://iwantmymtg.net
              run: ./.github/scripts/deploy.sh
