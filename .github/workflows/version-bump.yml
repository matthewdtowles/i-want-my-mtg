name: Version Bump

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize]

jobs:
    bump:
        runs-on: ubuntu-latest
        if: github.actor != 'github-actions[bot]'
        permissions:
            contents: write
        steps:
            - name: Checkout PR branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 0

            - name: Get current version
              id: current
              run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

            - name: Determine bump type from commits
              id: bump
              run: |
                  COMMITS=$(git log origin/main..HEAD --pretty=format:"%s%n%b")
                  if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+!:"; then
                    echo "type=major" >> "$GITHUB_OUTPUT"
                  elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
                    echo "type=minor" >> "$GITHUB_OUTPUT"
                  else
                    echo "type=patch" >> "$GITHUB_OUTPUT"
                  fi

            - name: Compute new version
              id: version
              run: |
                  IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
                  case "${{ steps.bump.outputs.type }}" in
                    major) major=$((major + 1)); minor=0; patch=0 ;;
                    minor) minor=$((minor + 1)); patch=0 ;;
                    patch) patch=$((patch + 1)) ;;
                  esac
                  echo "new_version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

            - name: Bump version if changed
              run: |
                  CURRENT=$(jq -r .version package.json)
                  NEW="${{ steps.version.outputs.new_version }}"
                  if [ "$CURRENT" = "$NEW" ]; then
                    echo "Version already at $NEW, skipping"
                    exit 0
                  fi
                  npm version "$NEW" --no-git-tag-version
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package.json package-lock.json
                  git commit -m "chore: bump version to $NEW"
                  git push
